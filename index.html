<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E.ON Policy Hub — EU ETS1 Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1B1F27; --surface: #242933; --surface-raised: #2C323E; --surface-nested: #1F242D;
    --border: #383F4C; --text-primary: #E8E6E1; --text-secondary: #9AA0AC; --text-tertiary: #6B7280;
    --ep: #D4A24C; --comm: #5B84B1; --council: #4C9A8C;
    --support: #7FB069; --oppose: #C1554B; --neutral: #8B93A3; --unclear: #4A5160;
    --font-display: 'Source Serif 4', Georgia, serif;
    --font-body: 'IBM Plex Sans', -apple-system, sans-serif;
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text-primary); font-family: var(--font-body); padding: 32px 40px 80px; min-height: 100vh; }

  header { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 16px; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 20px; }
  .header-left { flex: 1; min-width: 280px; }
  .hub-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  h1 { font-family: var(--font-display); font-size: 28px; font-weight: 600; letter-spacing: -0.01em; }
  .subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 4px; font-family: var(--font-mono); letter-spacing: 0.02em; }
  .meta { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); text-align: right; }

  select#dossierSelect {
    background: var(--surface-raised); border: 1px solid var(--ep); color: var(--text-primary);
    font-family: var(--font-display); font-size: 15px; font-weight: 600; padding: 8px 14px; border-radius: 8px; margin-top: 6px;
  }

  .controls { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 14px; }
  .view-toggle { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
  .view-toggle button { background: none; border: none; color: var(--text-secondary); font-family: var(--font-body); font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: background 0.15s, color 0.15s; }
  .view-toggle button.active { background: var(--surface-raised); color: var(--text-primary); }
  select#topicSelect { background: var(--surface); border: 1px solid var(--border); color: var(--text-primary); font-family: var(--font-body); font-size: 13px; padding: 9px 14px; border-radius: 8px; min-width: 380px; }

  .legend { display: flex; gap: 18px; font-size: 11px; color: var(--text-secondary); font-family: var(--font-mono); align-items: center; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch { width: 10px; height: 10px; border-radius: 2px; }

  .topic-key-toggle { background: none; border: 1px solid var(--border); color: var(--text-secondary); font-family: var(--font-mono); font-size: 10px; padding: 5px 10px; border-radius: 6px; cursor: pointer; margin-bottom: 14px; }
  .topic-key-toggle:hover { color: var(--text-primary); border-color: var(--text-tertiary); }
  .topic-key-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); line-height: 2; }
  .topic-key-panel .code { color: var(--text-primary); font-weight: 500; }

  .institution-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  @media (max-width: 1100px) { .institution-grid { grid-template-columns: 1fr !important; } }
  .institution-panel-sub { font-family: var(--font-mono); font-size: 9.5px; color: var(--text-tertiary); line-height: 1.5; padding: 10px 14px 14px; }
  .dual-donut-row { display: flex; gap: 10px; }
  .dual-donut-col { flex: 1 1 0; min-width: 0; }
  .dual-donut-col .donut-panel { padding: 14px 8px; }
  .dual-donut-col .donut-panel-title { font-size: 12px; }
  .dual-donut-col .donut-panel-sub { font-size: 9.5px; margin-bottom: 10px; }
  .dual-donut-col .donut { width: 100px; height: 100px; margin-bottom: 12px; }
  .dual-donut-col .donut-hole { width: 64px; height: 64px; }
  .dual-donut-col .donut-hole-pct { font-size: 20px; }
  .dual-donut-col .donut-hole-label { font-size: 9px; }
  .dual-donut-col .donut-legend-row { font-size: 10.5px; }
  .envi-members-toggle { background: none; border: 1px dashed var(--support); color: var(--support); font-family: var(--font-mono); font-size: 10px; padding: 4px 10px; border-radius: 6px; cursor: pointer; margin-top: 8px; margin-bottom: 4px; }
  .institution-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .institution-header { padding: 16px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .institution-name { font-family: var(--font-display); font-size: 16px; font-weight: 600; }
  .institution-count { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); text-align: right; }
  .stakeholder-list { padding: 8px; }
  .stakeholder-list > .donut-panel { margin-bottom: 20px; }
  .country-header { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-tertiary); padding: 12px 14px 4px; }
  .group-block { border-bottom: 1px solid rgba(56,63,76,0.6); padding-bottom: 4px; margin-bottom: 4px; }
  .group-block:last-child { border-bottom: none; }
  .stakeholder-card { padding: 12px 14px; border-radius: 8px; margin-bottom: 4px; transition: background 0.15s; }
  .stakeholder-card:hover { background: var(--surface-raised); }
  .stakeholder-card.group-card { background: rgba(212, 162, 76, 0.06); border: 1px solid rgba(212, 162, 76, 0.25); }
  .member-card { padding: 10px 12px; border-radius: 6px; background: var(--surface-nested); margin-bottom: 4px; }
  .expand-toggle { background: none; border: 1px dashed var(--border); color: var(--text-secondary); font-family: var(--font-mono); font-size: 10px; padding: 4px 10px; border-radius: 6px; cursor: pointer; margin-top: 8px; }
  .expand-toggle:hover { color: var(--text-primary); border-color: var(--ep); }
  .show-all-toggle { display: block; width: calc(100% - 28px); margin: 14px 14px 4px; padding: 8px; text-align: center; font-size: 10.5px; }
  .stakeholder-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .stakeholder-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .group-card .stakeholder-name { font-family: var(--font-display); font-size: 15px; }
  .member-card .stakeholder-name { font-size: 13px; }
  .stakeholder-tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); white-space: nowrap; }
  .stakeholder-role { font-size: 12px; color: var(--text-secondary); margin-top: 2px; line-height: 1.4; }
  .role-hover { cursor: help; border-bottom: 1px dotted rgba(139,147,163,0.6); }
  .bloc-members { font-size: 11px; color: var(--text-tertiary); margin-top: 5px; line-height: 1.6; }
  .stance-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
  .stance-chip { font-family: var(--font-mono); font-size: 9px; font-weight: 500; padding: 3px 6px; border-radius: 4px; background: rgba(255,255,255,0.03); color: var(--text-tertiary); border: 1px solid var(--border); cursor: default; letter-spacing: 0.02em; }
  .stance-chip[data-stance="support"] { background: rgba(127, 176, 105, 0.16); color: var(--support); border-color: rgba(127, 176, 105, 0.4); }
  .stance-chip[data-stance="oppose"] { background: rgba(193, 85, 75, 0.16); color: var(--oppose); border-color: rgba(193, 85, 75, 0.4); }
  .stance-chip[data-stance="neutral"] { background: rgba(139, 147, 163, 0.32); color: #D6DAE1; border-color: rgba(139, 147, 163, 0.75); border-width: 1.5px; font-weight: 600; }
  .stance-chip[data-intensity="1"] { opacity: 0.65; }
  .stance-chip[data-intensity="2"] { opacity: 0.85; }
  .stance-chip[data-intensity="3"] { opacity: 1; }
  .stance-chip[data-lowconf="1"] { border-style: dashed; }
  a.stance-chip { text-decoration: none; cursor: pointer; }
  a.stance-chip:hover { filter: brightness(1.3); }
  a.stance-chip::after { content: ' ↗'; opacity: 0.6; font-size: 8px; }

  .topic-view-header { margin-bottom: 20px; }
  .topic-title { font-family: var(--font-display); font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .topic-desc { font-size: 13px; color: var(--text-secondary); max-width: 720px; line-height: 1.5; }
  .topic-columns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 24px; }
  @media (max-width: 1100px) { .topic-columns { grid-template-columns: 1fr; } }
  .topic-col-header { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-tertiary); padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
  .topic-stakeholder-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 4px; border-bottom: 1px solid rgba(56,63,76,0.5); gap: 12px; }
  .topic-stakeholder-row:last-child { border-bottom: none; }
  .topic-stakeholder-row.is-group { background: rgba(212, 162, 76, 0.05); border-radius: 6px; padding-left: 8px; }
  .topic-stakeholder-row.is-member { padding-left: 20px; }
  .tsr-name { font-size: 13px; font-weight: 500; }
  .tsr-role { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }
  .stance-indicator { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .signal-bars { display: flex; gap: 2px; align-items: flex-end; height: 14px; }
  .signal-bar { width: 4px; border-radius: 1px; background: var(--border); }
  .signal-bar:nth-child(1) { height: 5px; } .signal-bar:nth-child(2) { height: 9px; } .signal-bar:nth-child(3) { height: 14px; }
  .stance-label { font-family: var(--font-mono); font-size: 10px; width: 110px; text-align: right; }
  .stance-label.support { color: var(--support); } .stance-label.oppose { color: var(--oppose); } .stance-label.neutral { color: var(--neutral); } .stance-label.unclear { color: var(--text-tertiary); }

  .donut-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
  @media (max-width: 1100px) { .donut-grid { grid-template-columns: 1fr; } }
  .donut-panel { background: var(--surface-raised); border: 1px solid var(--border); border-radius: 10px; padding: 20px; text-align: center; display: flex; flex-direction: column; justify-content: center; box-sizing: border-box; }
  .donut-panel-title { font-family: var(--font-display); font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .ep-mode-select-title {
    font-family: var(--font-display); font-size: 15px; font-weight: 600;
    background: none; border: none; color: var(--text-primary); cursor: pointer;
    text-align: center; text-align-last: center; padding: 0;
  }
  .ep-mode-select-title:hover { color: var(--ep); }
  .ep-mode-select-title:focus { outline: 1px solid var(--ep); border-radius: 3px; }
  .ep-mode-select-title option { background: var(--surface); color: var(--text-primary); font-family: var(--font-body); font-weight: 400; }
  .donut-panel-sub { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); margin-bottom: 16px; }
  .donut { width: 156px; height: 156px; border-radius: 50%; margin: 0 auto 18px; position: relative; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 12px rgba(0,0,0,0.25); }
  .donut::after { content: ''; position: absolute; inset: 0; border-radius: 50%; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04); pointer-events: none; }
  .donut-hole { width: 100px; height: 100px; border-radius: 50%; background: var(--surface-raised); display: flex; align-items: center; justify-content: center; flex-direction: column; box-shadow: inset 0 1px 3px rgba(0,0,0,0.3); }
  .donut-hole-pct { font-family: var(--font-display); font-size: 30px; font-weight: 600; color: var(--text-primary); line-height: 1; }
  .donut-hole-label { font-family: var(--font-mono); font-size: 9px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 3px; }
  .donut-legend { display: flex; flex-direction: column; gap: 6px; text-align: left; font-family: var(--font-mono); font-size: 11px; }
  .donut-legend-row { display: flex; justify-content: space-between; color: var(--text-secondary); }
  .donut-legend-swatch { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 6px; }
  .comm-badge { display: inline-flex; flex-direction: column; align-items: center; gap: 10px; padding: 24px 20px; }
  .comm-badge-pill { font-family: var(--font-mono); font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 20px; letter-spacing: 0.03em; }
  .comm-badge-pill.support { background: rgba(127,176,105,0.16); color: var(--support); border: 1px solid rgba(127,176,105,0.5); }
  .comm-badge-pill.oppose { background: rgba(193,85,75,0.16); color: var(--oppose); border: 1px solid rgba(193,85,75,0.5); }
  .comm-badge-pill.neutral { background: rgba(139,147,163,0.16); color: var(--neutral); border: 1px solid rgba(139,147,163,0.5); }
  .comm-badge-pill.unclear { background: rgba(255,255,255,0.03); color: var(--text-tertiary); border: 1px solid var(--border); }
  .comm-badge-detail { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); }

  footer { margin-top: 40px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); line-height: 1.6; }
  .hidden { display: none !important; }

  /* ---- Executive summary hero (Overview top) ---- */
  .exec-hero { margin-bottom: 34px; }
  .exec-hero-headline {
    font-family: var(--font-display); font-size: 15px; font-weight: 400; line-height: 1.6;
    color: var(--text-secondary); max-width: none; margin-bottom: 22px;
  }
  .exec-hero-headline strong { color: var(--text-primary); font-weight: 600; }
  .exec-hero-headline .hl-support { color: var(--support); font-weight: 600; }
  .exec-hero-headline .hl-oppose { color: var(--oppose); font-weight: 600; }

  .heatmap-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 4px; overflow: hidden; }
  table.heatmap { border-collapse: collapse; width: 100%; table-layout: fixed; }
  table.heatmap th, table.heatmap td { padding: 0; }
  table.heatmap thead th {
    font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-secondary); font-weight: 500; padding: 14px 8px 12px; text-align: center; vertical-align: bottom;
  }
  table.heatmap thead th.hm-topic-col { text-align: left; width: 30%; padding-left: 16px; color: var(--text-tertiary); }
  table.heatmap thead th .hm-inst-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  .hm-topic-cell {
    font-family: var(--font-body); font-size: 12px; color: var(--text-primary); font-weight: 500;
    padding: 0 16px; line-height: 1.35;
  }
  .hm-topic-cell .hm-code { font-family: var(--font-mono); font-size: 9px; color: var(--text-tertiary); display: block; margin-top: 2px; letter-spacing: 0.03em; }
  table.heatmap tbody tr { border-top: 1px solid rgba(56,63,76,0.4); }
  table.heatmap tbody tr:hover { background: rgba(255,255,255,0.015); }
  .hm-cell { text-align: center; padding: 8px 6px !important; }
  .hm-verdict {
    display: inline-flex; align-items: center; justify-content: center; gap: 5px;
    min-width: 64px; padding: 6px 10px; border-radius: 6px;
    font-family: var(--font-mono); font-size: 10px; font-weight: 500; letter-spacing: 0.02em;
  }
  .hm-verdict.support { background: rgba(127,176,105,0.15); color: var(--support); border: 1px solid rgba(127,176,105,0.35); }
  .hm-verdict.oppose  { background: rgba(193,85,75,0.15); color: var(--oppose); border: 1px solid rgba(193,85,75,0.35); }
  .hm-verdict.neutral { background: rgba(139,147,163,0.18); color: #C3C9D4; border: 1px solid rgba(139,147,163,0.4); }
  .hm-verdict.nodata  { background: transparent; color: var(--text-tertiary); border: 1px solid rgba(56,63,76,0.5); opacity: 0.55; }
  .hm-verdict .hm-pct { opacity: 0.7; font-size: 9px; }
  .heatmap-caption { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); margin-top: 10px; padding: 0 4px; line-height: 1.6; }
  .ep-mode-select {
    font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;
    background: none; border: none; color: var(--text-secondary); font-weight: 500;
    cursor: pointer; padding: 0 14px 0 0; vertical-align: middle; -webkit-appearance: menulist-button;
  }
  .ep-mode-select:hover { color: var(--text-primary); }
  .ep-mode-select:focus { outline: 1px solid var(--ep); border-radius: 3px; }
  .ep-mode-select option { background: var(--surface); color: var(--text-primary); text-transform: none; }

  /* ---- Overview view ---- */
  .overview-section { margin-bottom: 32px; }
  .overview-section-title {
    font-family: var(--font-display); font-size: 18px; font-weight: 600;
    margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .overview-background {
    font-size: 14px; line-height: 1.7; color: var(--text-secondary); max-width: none;
  }
  .overview-section-title--toggle {
    cursor: pointer; display: flex; align-items: center; gap: 12px; user-select: none;
  }
  .overview-section-title--toggle:hover { color: var(--text-primary); }
  .overview-section-toggle-icon {
    margin-top: 0; font-size: 11px; font-weight: 400; text-transform: none; letter-spacing: normal;
  }

  /* ---- EUA price card ---- */
  .eua-price-card {
    display: flex; align-items: center; gap: 28px; flex-wrap: wrap;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 22px; margin-bottom: 32px;
  }
  .eua-price-label {
    font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-tertiary); margin-bottom: 4px;
  }
  .eua-price-main { display: flex; align-items: baseline; gap: 10px; }
  .eua-price-value { font-family: var(--font-display); font-size: 32px; font-weight: 600; color: var(--text-primary); line-height: 1; }
  .eua-price-unit { font-family: var(--font-mono); font-size: 12px; color: var(--text-tertiary); }
  .eua-price-change {
    display: inline-flex; align-items: center; gap: 4px; font-family: var(--font-mono); font-size: 13px; font-weight: 600;
    padding: 3px 8px; border-radius: 6px;
  }
  .eua-price-change.up { color: var(--support); background: rgba(127,176,105,0.14); border: 1px solid rgba(127,176,105,0.35); }
  .eua-price-change.down { color: var(--oppose); background: rgba(193,85,75,0.14); border: 1px solid rgba(193,85,75,0.35); }
  .eua-price-change.flat { color: var(--neutral); background: rgba(139,147,163,0.14); border: 1px solid rgba(139,147,163,0.35); }
  .eua-price-sparkline { flex-shrink: 0; }
  .eua-price-meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); line-height: 1.7; margin-left: auto; text-align: right; }
  .eua-price-meta a { color: var(--text-tertiary); }
  @media (max-width: 700px) { .eua-price-card { flex-direction: column; align-items: flex-start; } .eua-price-meta { margin-left: 0; text-align: left; } }

  /* ---- Overview top row: EUA price (left) + Headline of the Day (right), equal width ---- */
  .overview-top-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: stretch; margin-bottom: 32px; }
  .overview-top-row .eua-price-card { margin-bottom: 0; height: 100%; box-sizing: border-box; }
  @media (max-width: 900px) { .overview-top-row { grid-template-columns: 1fr; } }

  .headline-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 22px; box-sizing: border-box; height: 100%;
    display: flex; flex-direction: column;
  }
  .headline-label {
    font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-tertiary); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: baseline;
  }
  .headline-date { color: var(--text-tertiary); font-weight: 400; }
  .headline-text { font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--text-primary); line-height: 1.35; margin-bottom: 8px; }
  .headline-summary { font-size: 12.5px; color: var(--text-secondary); line-height: 1.55; margin-bottom: 10px; }
  .headline-impact { font-family: var(--font-mono); font-size: 10.5px; color: var(--support); line-height: 1.5; margin-bottom: auto; padding-bottom: 10px; }
  .headline-source { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); }
  .headline-source a { color: var(--text-tertiary); }
  .headline-history { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .headline-history-toggle {

  @media (max-width: 1100px) { .milestone-cols { grid-template-columns: 1fr; } }
  .milestone-col { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .milestone-col-header { padding: 13px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 7px; }
  .milestone-col-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .milestone-col-title { font-family: var(--font-display); font-size: 14px; font-weight: 600; }
  .milestone-col-body { padding: 4px 16px; }
  .milestone-col-empty { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); padding: 16px 0; }
  .milestone-row { padding: 13px 0; border-bottom: 1px solid rgba(56,63,76,0.5); }
  .milestone-col-body .milestone-row:last-child { border-bottom: none; }
  .milestone-date { font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--text-tertiary); margin-bottom: 3px; }
  .milestone-row.occurred .milestone-date { color: var(--support); }
  .milestone-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; line-height: 1.35; }
  .milestone-row.occurred .milestone-title { color: var(--support); }
  .milestone-row.occurred .milestone-title a { color: var(--support); }
  .milestone-title a { color: var(--text-primary); }
  .milestone-check { display: inline-block; margin-right: 4px; }

    background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px;

  .milestone-row.occurred .milestone-status { color: var(--support); background: rgba(127,176,105,0.12); border-color: rgba(127,176,105,0.35); }
  .milestone-note { font-size: 11.5px; color: var(--text-tertiary); line-height: 1.5; }
  .milestone-joint-wrap { margin-top: 4px; }
  .milestone-joint-label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-tertiary); margin-bottom: 8px; }
  .milestone-joint-row {
    display: flex; gap: 16px; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 8px; align-items: flex-start;

  .milestone-joint-row .milestone-date { flex-shrink: 0; width: 110px; margin-bottom: 0; margin-top: 1px; }
  .milestones-checked { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); margin-top: 14px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="hub-label">E.ON POLICY HUB</div>
    <h1 id="dossierTitle">Loading…</h1>
    <div class="subtitle" id="dossierSubtitle"></div>
    <select id="dossierSelect"></select>
  </div>
  <div class="meta" id="dossierMeta"></div>
</header>

<div class="controls">
  <div class="view-toggle">
    <button class="active" data-view="overview">Overview</button>
    <button data-view="institution">By Institution</button>
    <button data-view="topic">By Topic</button>
  </div>

  <select id="topicSelect" class="hidden"></select>

  <div class="legend">
    <div class="legend-item"><span class="legend-swatch" style="background:rgba(127,176,105,0.35);border:1px solid var(--support)"></span>Aligned</div>
    <div class="legend-item"><span class="legend-swatch" style="background:rgba(193,85,75,0.35);border:1px solid var(--oppose)"></span>Opposed</div>
    <div class="legend-item"><span class="legend-swatch" style="background:rgba(139,147,163,0.32);border:1.5px solid rgba(139,147,163,0.75)"></span>Mixed</div>
    <div class="legend-item"><span class="legend-swatch" style="background:rgba(255,255,255,0.03);border:1px solid var(--border)"></span>Not yet assessed</div>
    <div class="legend-item"><span class="legend-swatch" style="border:1px dashed var(--text-tertiary);background:none"></span>Confidence 1/3 (inferred)</div>
  </div>
</div>

<button class="topic-key-toggle" id="topicKeyToggle">Show topic code key ▾</button>
<div class="topic-key-panel hidden" id="topicKeyPanel"></div>

<div id="overviewView"></div>
<div id="institutionView" class="hidden"></div>
<div id="topicView" class="hidden"></div>

<footer id="footer"></footer>

<script>
// =================================================================
// POLICY HUB — GENERIC ENGINE
// This code is dossier-agnostic. It knows nothing about "ETS" —
// only about the generic schema: dossier -> institutions -> entities -> stances.
// To add a new dossier: add a new key to DOSSIERS below following the same
// schema. No engine code changes required.
// =================================================================

let DOSSIERS = {};
let currentDossierId = null;
let currentView = 'overview';
let overviewEpMode = 'envi'; // 'envi' | 'plenary' — which EP view feeds the Overview exec heatmap

function getDossier() { return DOSSIERS[currentDossierId]; }

// ---------------------------------------------------------------
// Weighted breakdown — CASCADING: a parent's own stance (if present)
// always trumps its children's stances for that topic, using the
// parent's FULL weight. Only when a parent has no stance for a topic
// do we recurse into children to look for a more specific position.
// This prevents double-counting across group -> delegation -> MEP.
// ---------------------------------------------------------------
function resolveContribution(entity, topicId, allEntities, acc) {
  const s = entity.stances[topicId];
  if (s) {
    const confFactor = s.confidence / 3;
    acc[s.stance] += entity.weight * confFactor;
    acc.nodata += entity.weight * (1 - confFactor);
    return;
  }
  const children = allEntities.filter(c => c.parentId === entity.id && typeof c.weight === 'number');
  if (children.length === 0) {
    acc.nodata += entity.weight;
    return;
  }
  children.forEach(child => resolveContribution(child, topicId, allEntities, acc));
}

function computeBreakdown(entities, topicIds) {
  const acc = { support: 0, oppose: 0, neutral: 0, nodata: 0 };
  const topLevel = entities.filter(e => !e.parentId && typeof e.weight === 'number');
  topLevel.forEach(entity => {
    topicIds.forEach(topicId => resolveContribution(entity, topicId, entities, acc));
  });
  const totalWeight = acc.support + acc.oppose + acc.neutral + acc.nodata;
  return { ...acc, totalWeight };
}

function pct(part, total) { return total > 0 ? (part / total * 100) : 0; }

function conicGradient(bd) {
  const { support, oppose, neutral, nodata, totalWeight } = bd;
  if (totalWeight === 0) return `conic-gradient(var(--unclear) 0 360deg)`;
  const segs = [
    { color: 'var(--support)', v: support }, { color: 'var(--oppose)', v: oppose },
    { color: 'var(--neutral)', v: neutral }, { color: 'var(--unclear)', v: nodata },
  ];
  let acc = 0; const stops = [];
  segs.forEach(seg => {
    const start = acc / totalWeight * 360; acc += seg.v; const end = acc / totalWeight * 360;
    if (seg.v > 0) stops.push(`${seg.color} ${start}deg ${end}deg`);
  });
  return `conic-gradient(${stops.join(', ')})`;
}

function donutHTML(title, sub, bd) {
  const alignedPct = pct(bd.support, bd.totalWeight);
  return `
    <div class="donut-panel">
      <div class="donut-panel-title">${title}</div>
      <div class="donut-panel-sub">${sub}</div>
      <div class="donut" style="background:${conicGradient(bd)}">
        <div class="donut-hole"><div class="donut-hole-pct">${alignedPct.toFixed(0)}%</div><div class="donut-hole-label">aligned</div></div>
      </div>
      <div class="donut-legend">
        <div class="donut-legend-row"><span><span class="donut-legend-swatch" style="background:var(--support)"></span>Aligned</span><span>${pct(bd.support,bd.totalWeight).toFixed(0)}%</span></div>
        <div class="donut-legend-row"><span><span class="donut-legend-swatch" style="background:var(--oppose)"></span>Opposed</span><span>${pct(bd.oppose,bd.totalWeight).toFixed(0)}%</span></div>
        <div class="donut-legend-row"><span><span class="donut-legend-swatch" style="background:var(--neutral)"></span>Mixed</span><span>${pct(bd.neutral,bd.totalWeight).toFixed(0)}%</span></div>
        <div class="donut-legend-row"><span><span class="donut-legend-swatch" style="background:var(--unclear)"></span>No data</span><span>${pct(bd.nodata,bd.totalWeight).toFixed(0)}%</span></div>
      </div>
    </div>
  `;
}

function singleActorBadgeHTML(institution) {
  const rep = institution.entities[0];
  const bd = computeBreakdown([{ ...rep, weight: 1 }], getDossier().topics.map(t => t.id));
  const { support, oppose, neutral, nodata, totalWeight } = bd;
  let cls = 'unclear', text = 'NO DATA';
  if (totalWeight > 0) {
    const top = Math.max(support, oppose, neutral, nodata);
    if (top === support && support > 0) { cls = 'support'; text = 'ALIGNED'; }
    else if (top === oppose && oppose > 0) { cls = 'oppose'; text = 'OPPOSED'; }
    else if (top === neutral && neutral > 0) { cls = 'neutral'; text = 'MIXED'; }
  }
  return `
    <div class="donut-panel">
      <div class="donut-panel-title">${institution.label}</div>
      <div class="donut-panel-sub">${institution.weightUnitLabel}</div>
      <div class="comm-badge">
        <div class="comm-badge-pill ${cls}">${text}</div>
        <div class="comm-badge-detail">${pct(support,totalWeight).toFixed(0)}% aligned / ${pct(oppose,totalWeight).toFixed(0)}% opposed / ${pct(nodata,totalWeight).toFixed(0)}% no data</div>
      </div>
    </div>
  `;
}

function singleActorBadgeForTopicHTML(institution, topicId) {
  const rep = institution.entities[0];
  const bd = computeBreakdown([{ ...rep, weight: 1 }], [topicId]);
  return singleActorBadgeHTMLFromBreakdown(institution, bd);
}

function singleActorBadgeHTMLFromBreakdown(institution, bd) {
  const { support, oppose, neutral, nodata, totalWeight } = bd;
  let cls = 'unclear', text = 'NO DATA';
  if (totalWeight > 0) {
    const top = Math.max(support, oppose, neutral, nodata);
    if (top === support && support > 0) { cls = 'support'; text = 'ALIGNED'; }
    else if (top === oppose && oppose > 0) { cls = 'oppose'; text = 'OPPOSED'; }
    else if (top === neutral && neutral > 0) { cls = 'neutral'; text = 'MIXED'; }
  }
  return `
    <div class="donut-panel">
      <div class="donut-panel-title">${institution.label}</div>
      <div class="donut-panel-sub">${institution.weightUnitLabel}</div>
      <div class="comm-badge">
        <div class="comm-badge-pill ${cls}">${text}</div>
        <div class="comm-badge-detail">${pct(support,totalWeight).toFixed(0)}% aligned / ${pct(oppose,totalWeight).toFixed(0)}% opposed / ${pct(nodata,totalWeight).toFixed(0)}% no data</div>
      </div>
    </div>
  `;
}

function institutionOverviewHTML(institution, titleOverride) {
  if (institution.weightMode === 'single') return singleActorBadgeHTML(institution);
  const bd = computeBreakdown(institution.entities, getDossier().topics.map(t => t.id));
  return donutHTML(titleOverride || 'Overall alignment', institution.weightUnitLabel + ', across all topics', bd);
}

function epModeSelectTitleHTML(mode, setterName) {
  return `<select class="ep-mode-select-title" onchange="${setterName}(this.value)">
    <option value="envi"${mode === 'envi' ? ' selected' : ''}>ENVI</option>
    <option value="plenary"${mode === 'plenary' ? ' selected' : ''}>Full Plenary</option>
  </select>`;
}

let topicEpMode = 'envi';
function setTopicEpMode(mode) {
  if (topicEpMode === mode) return;
  topicEpMode = mode;
  renderTopicView(document.getElementById('topicSelect').value);
}

function institutionTopicHTML(institution, topicId) {
  if (institution.weightMode === 'single') return singleActorBadgeForTopicHTML(institution, topicId);
  if (institution.id === 'ep') {
    // Same compact single-box + dropdown pattern as the Overview heatmap: one donut, same size
    // as Council/Commission's, switchable between ENVI (default) and Full Plenary.
    const effective = topicEpMode === 'envi' ? buildEnviInstitution(institution) : institution;
    const bd = computeBreakdown(effective.entities, [topicId]);
    return donutHTML(epModeSelectTitleHTML(topicEpMode, 'setTopicEpMode'), effective.weightUnitLabel, bd);
  }
  const bd = computeBreakdown(institution.entities, [topicId]);
  return donutHTML(institution.label, institution.weightUnitLabel, bd);
}

// ---------------------------------------------------------------
// Stance chips (generic)
// ---------------------------------------------------------------
function sourceLabel(s) {
  if (s.source === 'manual') return s.url ? 'SOURCE: Manual input (E.ON internal intel) — corroborating public source now available, click to open' : 'SOURCE: Manual input (E.ON internal intel)';
  if (s.source === 'document') return s.url ? 'SOURCE: Provided by Jonas (document/report) — public source found, click to open' : 'SOURCE: Provided by Jonas (internal document, not publicly available)';
  if (s.source === 'research') return s.url ? 'SOURCE: Claude web research — click to open' : 'SOURCE: Claude web research';
  return 'SOURCE: unspecified';
}

function stanceChipHTML(topicId, stances) {
  const s = stances[topicId];
  const topic = getDossier().topics.find(t => t.id === topicId);
  if (!s) return `<span class="stance-chip" title="${topic.label}: not yet assessed">${topic.code}</span>`;
  const tip = `${topic.label}: ${s.stance.toUpperCase()} (intensity ${s.intensity}/3) (confidence ${s.confidence}/3) — ${sourceLabel(s)}${s.note ? ' — ' + s.note : ''}`;
  const lowconf = s.confidence <= 1 ? 'data-lowconf="1"' : '';
  const safeTip = tip.replace(/"/g,'&quot;');
  if (s.url) return `<a class="stance-chip" href="${s.url}" target="_blank" rel="noopener" data-stance="${s.stance}" data-intensity="${s.intensity}" ${lowconf} title="${safeTip}">${topic.code}</a>`;
  return `<span class="stance-chip" data-stance="${s.stance}" data-intensity="${s.intensity}" ${lowconf} title="${safeTip}">${topic.code}</span>`;
}

// ---------------------------------------------------------------
// Institution view (generic — nesting driven by entity.parentId,
// grouping-with-headers driven by institution.groupByField)
// ---------------------------------------------------------------
let expandState = {};

function toggleExpand(entityId) {
  expandState[entityId] = !expandState[entityId];
  renderInstitutionView();
}

function memberCardHTML(entity, depth, allEntities) {
  const dossier = getDossier();
  const indentStyle = ` style="margin-left:${depth * 16}px"`;

  let expandHTML = '';
  let nestedHTML = '';
  if (entity.isDelegation && allEntities) {
    const meps = allEntities.filter(c => c.parentId === entity.id && !c.hideFromList)
      .sort((a, b) => {
        const rankA = a.isKeyMEP ? -1 : (a.sortRank ?? 2);
        const rankB = b.isKeyMEP ? -1 : (b.sortRank ?? 2);
        return rankA - rankB;
      });
    if (meps.length > 0) {
      const isExpanded = !!expandState[entity.id];
      expandHTML = `<button class="expand-toggle" onclick="toggleExpand('${entity.id}')">${isExpanded ? '▾ Hide' : '▸ Show'} ${meps.length} MEPs</button>`;
      if (isExpanded) {
        nestedHTML = meps.map(m => memberCardHTML(m, depth + 1, allEntities)).join('');
      }
    }
  }

  return `
    <div class="stakeholder-card member-card"${indentStyle}>
      <div class="stakeholder-top">
        <span class="stakeholder-name">${entity.name}</span>
        <span class="stakeholder-tag">${entity.group}${entity.country && entity.country !== '—' ? ' · ' + entity.country : ''}</span>
      </div>
      <div class="stakeholder-role">${entity.role}</div>
      <div class="stance-row">${dossier.topics.map(t => stanceChipHTML(t.id, entity.stances)).join('')}</div>
      ${expandHTML}
    </div>
    ${nestedHTML}
  `;
}

function entityCardHTML(entity, allEntities, depth) {
  const dossier = getDossier();
  const membersHTML = entity.members ? `<div class="bloc-members">${entity.members.map(mem => `${mem.name} — ${mem.role}`).join('<br>')}</div>` : '';

  // Top-level group cards get two SEPARATE child sections: always-visible key MEPs, and an
  // expandable national-delegations list. These are never mixed in the same list.
  let keyMEPsHTML = '';
  let delegationSectionHTML = '';
  if (depth === 0 && entity.isGroupType) {
    const keyMEPs = allEntities.filter(c => c.isKeyMEP && c.group === entity.group);
    keyMEPsHTML = keyMEPs.map(m => memberCardHTML(m, 1, allEntities)).join('');

    const enviNode = allEntities.find(c => c.isEnviMembersNode && c.parentId === entity.id);
    // ENVI dropdown = every permanent ENVI-tagged entity belonging to this group, wherever it
    // structurally lives (key MEP, pre-existing national-delegation MEP, or the roster-completion
    // envi-members node) — a flat filter by group avoids missing anyone and avoids double-counting,
    // since each real person has exactly one entity. Key MEPs always listed first.
    const groupEnviAll = allEntities.filter(c => isEnviTagged(c) && c.group === entity.group);
    const enviKeyMEPs = groupEnviAll.filter(c => c.isKeyMEP);
    const enviRest = groupEnviAll.filter(c => !c.isKeyMEP);
    const enviCombined = [...enviKeyMEPs, ...enviRest];
    let enviSectionHTML = '';
    if (enviCombined.length > 0) {
      const enviToggleId = enviNode ? enviNode.id : `${entity.id}-envi-members`;
      const isEnviExpanded = !!expandState[enviToggleId];
      const enviToggleHTML = `<button class="expand-toggle envi-members-toggle" onclick="toggleExpand('${enviToggleId}')">${isEnviExpanded ? '▾ Hide' : '▸ Show'} ${enviCombined.length} ENVI Members</button>`;
      const enviMembersHTML = isEnviExpanded ? enviCombined.map(m => memberCardHTML(m, 1, allEntities)).join('') : '';
      enviSectionHTML = enviToggleHTML + enviMembersHTML;
    }

    const delegations = allEntities.filter(c => c.isDelegation && !c.isEnviMembersNode && c.parentId === entity.id);
    let delegationsSectionHTML = '';
    if (delegations.length > 0) {
      const isExpanded = !!expandState[entity.id];
      const toggleHTML = `<button class="expand-toggle" onclick="toggleExpand('${entity.id}')">${isExpanded ? '▾ Hide' : '▸ Show'} ${delegations.length} national delegations</button>`;
      const delegationsHTML = isExpanded ? delegations.map(d => memberCardHTML(d, 1, allEntities)).join('') : '';
      delegationsSectionHTML = toggleHTML + delegationsHTML;
    }
    delegationSectionHTML = enviSectionHTML + delegationsSectionHTML;
  }

  const cardClass = depth === 0 ? (entity.isGroupType ? 'stakeholder-card group-card' : 'stakeholder-card') : 'stakeholder-card member-card';
  const indentStyle = depth > 0 ? ` style="margin-left:${depth * 16}px"` : '';

  const ownCard = `
    <div class="${cardClass}"${indentStyle}>
      <div class="stakeholder-top">
        <span class="stakeholder-name">${entity.name}</span>
        <span class="stakeholder-tag">${entity.group}${entity.country && entity.country !== '—' ? ' · ' + entity.country : ''}</span>
      </div>
      <div class="stakeholder-role">${entity.role}</div>
      ${membersHTML}
      <div class="stance-row">${dossier.topics.map(t => stanceChipHTML(t.id, entity.stances)).join('')}</div>
      ${delegationSectionHTML}
    </div>
  `;

  return (depth === 0 && entity.isGroupType)
    ? `<div class="group-block">${ownCard}${keyMEPsHTML}</div>`
    : ownCard;
}

// ---------------------------------------------------------------
// ENVI Committee sub-view (EP institution only): identifies tracked
// ENVI members via role-text tagging ("... ENVI Committee member" /
// "... ENVI Committee substitute member" / "ENVI Coordinator" /
// "ENVI Chair" etc.), then computes an aggregate donut that lets an
// ENVI member without a personal statement INHERIT the nearest
// ancestor's (national delegation, then political group) stance —
// mirroring the same cascade logic used for the full Plenary, just
// read bottom-up at MEP granularity (weight 1 each). Individual
// member CARDS below the donut show only personally-sourced
// statements (no inheritance), to avoid implying an MEP said
// something they didn't.
// ---------------------------------------------------------------
function isEnviTagged(entity) {
  // Precise match — avoids false positives like a role note that merely mentions
  // "the ENVI site" in passing (e.g. Andrea Wechsler's sourcing note) rather than
  // an actual committee-membership tag. Only "permanent" members (Member/Vice-Chair/
  // Chair/Coordinator) are ever tagged this way — substitutes are deliberately
  // excluded from tagging (see memory §21).
  return !entity.isGroupType && !entity.isDelegation && !entity.hideFromList &&
    typeof entity.weight === 'number' && entity.role &&
    (entity.role.includes('ENVI Committee') || entity.role.includes('Coordinator, ENVI'));
}

function getEffectiveStance(entity, topicId, byId) {
  let cur = entity;
  let hops = 0;
  while (cur && hops < 10) {
    if (cur.stances && cur.stances[topicId]) return cur.stances[topicId];
    cur = cur.parentId ? byId[cur.parentId] : null;
    hops++;
  }
  return null;
}

// Permanent ENVI committee members who sit as Non-Inscrits (no political group) — untrackable in
// this tool (every entity here hangs off a political-group node), but they ARE real permanent
// members of the official 90-seat committee. Counted as "no data" weight in the ENVI donut's
// denominator so the aggregate % reflects the true committee size, not just the trackable subset.
// Source: europarl.europa.eu/committees/en/envi/home/members (checked 11 Jul 2026).
const ENVI_UNTRACKED_NI = [
  { id: 'ni-envi-1', name: 'Ondřej Dostál', country: 'CZ' },
  { id: 'ni-envi-2', name: 'Fernand Kartheiser', country: 'LU' },
];

function buildEnviInstitution(epInstitution) {
  const byId = {};
  epInstitution.entities.forEach(e => { byId[e.id] = e; });
  const members = epInstitution.entities.filter(isEnviTagged);
  const topicIds = getDossier().topics.map(t => t.id);
  const syntheticEntities = members.map(e => {
    const stances = {};
    topicIds.forEach(tid => {
      const eff = getEffectiveStance(e, tid, byId);
      if (eff) stances[tid] = eff;
    });
    return { ...e, parentId: undefined, syntheticStances: stances, stances };
  });
  // NI placeholders: weight 1 each, no group/stances — always resolve to "no data" for every topic,
  // never appear in the member-card list (_memberSourceEntities uses `members` only).
  const niPlaceholders = ENVI_UNTRACKED_NI.map(ni => ({
    id: ni.id, name: ni.name, country: ni.country, group: 'NI',
    role: 'Non-Inscrit — not trackable in this tool (no political group)',
    weight: 1, stances: {}, parentId: undefined,
  }));
  return {
    id: 'envi', label: 'ENVI Committee', colorVar: epInstitution.colorVar,
    weightMode: 'weighted',
    weightUnitLabel: `Seat-weighted, ${members.length + ENVI_UNTRACKED_NI.length} permanent ENVI members`,
    entities: [...syntheticEntities, ...niPlaceholders],
    _memberSourceEntities: members, // original entities (own stances only) for the card list below — excludes NI placeholders
  };
}

// EP: the 3 groups with no individually-assessed positions yet stay collapsed by default so the
// page doesn't get too long — expandable via "Show all" at the bottom of the list.
const EP_SECONDARY_GROUP_IDS = new Set(['pfe', 'esn', 'the-left']);

function institutionPanelHTML(inst) {
  // Council's 16 "not individually tracked" member states were already modeled as hideFromList
  // residuals (weight counted, never rendered). Jonas now wants them individually visible for
  // completeness, just collapsed behind "Show all" — so for Council specifically we don't drop
  // hideFromList entities upfront; hideFromList becomes the "secondary" marker instead of "never".
  // Every other institution keeps the original behavior (hideFromList = never shown, e.g. EP's
  // "-other-states" weight residuals, which are not real individual entities to browse).
  const topEntities = inst.id === 'council'
    ? inst.entities.filter(e => !e.parentId)
    : inst.entities.filter(e => !e.parentId && !e.hideFromList);
  const showAllKey = `${inst.id}-show-all`;
  const showAll = !!expandState[showAllKey];
  let bodyHTML, hiddenCount = 0, hiddenLabel = '';

  if (inst.groupByField) {
    // Council: all 27 member states are tracked for completeness, but only the ones with an
    // actual assessed position show by default — the rest (not yet individually tracked) are
    // one click away via "Show all".
    const groups = [...new Set(topEntities.map(e => e[inst.groupByField]))];
    const groupIsSecondary = g => topEntities.filter(e => e[inst.groupByField] === g).every(e => e.hideFromList);
    const primaryGroups = groups.filter(g => !groupIsSecondary(g));
    const secondaryGroups = groups.filter(groupIsSecondary);
    hiddenCount = secondaryGroups.length;
    hiddenLabel = 'member states (not individually tracked)';
    const visibleGroups = showAll ? groups : primaryGroups;
    bodyHTML = visibleGroups.map(g => {
      const inGroup = topEntities.filter(e => e[inst.groupByField] === g);
      return `<div class="country-header">${g}</div>` + inGroup.map(e => entityCardHTML(e, inst.entities, 0)).join('');
    }).join('');
  } else if (inst.id === 'ep') {
    const primary = topEntities.filter(e => !EP_SECONDARY_GROUP_IDS.has(e.id));
    const secondary = topEntities.filter(e => EP_SECONDARY_GROUP_IDS.has(e.id));
    hiddenCount = secondary.length;
    hiddenLabel = 'political groups';
    const visible = showAll ? topEntities : primary;
    bodyHTML = visible.map(e => entityCardHTML(e, inst.entities, 0)).join('');
  } else {
    bodyHTML = topEntities.map(e => entityCardHTML(e, inst.entities, 0)).join('');
  }

  const showAllHTML = hiddenCount > 0
    ? `<button class="expand-toggle show-all-toggle" onclick="toggleExpand('${showAllKey}')">${showAll ? `▾ Hide ${hiddenCount} ${hiddenLabel}` : `▸ Show all (+${hiddenCount} ${hiddenLabel})`}</button>`
    : '';

  const countLabel = inst.groupByField
    ? `${[...new Set(topEntities.map(e => e[inst.groupByField]))].length} tracked`
    : `${topEntities.length} entities`;
  const donutSectionHTML = inst.id === 'ep' ? epInstitutionDonutHTML(inst, institutionEpMode) : institutionOverviewHTML(inst);
  return `
    <div class="institution-panel">
      <div class="institution-header" style="border-left:3px solid var(${inst.colorVar})">
        <div class="institution-name">${inst.label}</div>
        <div class="institution-count">${countLabel}</div>
      </div>
      <div class="stakeholder-list">
        ${donutSectionHTML}
        ${bodyHTML}
        ${showAllHTML}
      </div>
    </div>
  `;
}

// Equalizes the height of every top-of-column donut/badge box within a container so Commission's
// shorter single-actor badge, Council's full donut+legend, and EP's full donut+legend all render at
// identical height, however their content naturally differs — measured live in the browser rather
// than guessed via a fixed CSS min-height (which drifts out of sync whenever any box's content changes).
function equalizeDonutBoxHeights(containerSelector) {
  if (typeof document === 'undefined' || !document.querySelectorAll) return;
  const container = document.querySelector ? document.querySelector(containerSelector) : null;
  const scope = container || document;
  const boxes = scope.querySelectorAll ? Array.from(scope.querySelectorAll('.donut-panel')) : [];
  if (boxes.length < 2) return;
  boxes.forEach(b => { b.style.height = 'auto'; });
  const maxH = boxes.reduce((m, b) => Math.max(m, b.offsetHeight || 0), 0);
  if (maxH > 0) boxes.forEach(b => { b.style.height = maxH + 'px'; });
}

// Verdict for a single institution on a single topic (weighted, confidence-discounted).
function institutionVerdict(institution, topicId) {
  let bd;
  if (institution.weightMode === 'single') {
    const rep = institution.entities[0];
    bd = computeBreakdown([{ ...rep, weight: 1 }], [topicId]);
  } else {
    bd = computeBreakdown(institution.entities, [topicId]);
  }
  const assessed = bd.support + bd.oppose + bd.neutral;
  if (bd.totalWeight === 0 || assessed / bd.totalWeight < 0.10) {
    return { cls: 'nodata', label: '—', pct: null };
  }
  const top = Math.max(bd.support, bd.oppose, bd.neutral);
  let cls, label;
  if (top === bd.support) { cls = 'support'; label = 'Aligned'; }
  else if (top === bd.oppose) { cls = 'oppose'; label = 'Opposed'; }
  else { cls = 'neutral'; label = 'Mixed'; }
  return { cls, label, pct: Math.round(pct(top, bd.totalWeight)) };
}

function renderExecHeatmap(dossier) {
  const rawEp = dossier.institutions.find(i => i.id === 'ep');
  const effectiveEp = rawEp && overviewEpMode === 'envi' ? buildEnviInstitution(rawEp) : rawEp;
  const mapped = dossier.institutions.map(i => (i.id === 'ep' && effectiveEp) ? effectiveEp : i);
  const HEATMAP_ORDER = ['comm', 'ep', 'envi', 'council'];
  const insts = mapped.slice().sort((a, b) => HEATMAP_ORDER.indexOf(a.id) - HEATMAP_ORDER.indexOf(b.id));
  const topics = dossier.topics;

  // Build headline: count where EP (the primary weighted body, per current mode) aligns vs opposes on key topics.
  const ep = effectiveEp || insts[0];
  let epAligned = 0, epOpposed = 0, epAssessed = 0;
  topics.forEach(t => {
    const v = institutionVerdict(ep, t.id);
    if (v.cls === 'support') { epAligned++; epAssessed++; }
    else if (v.cls === 'oppose') { epOpposed++; epAssessed++; }
    else if (v.cls === 'neutral') { epAssessed++; }
  });

  const instDotColor = { ep: 'var(--ep)', envi: 'var(--ep)', council: 'var(--council)', comm: 'var(--comm)' };

  const headHTML = `
    <tr>
      <th class="hm-topic-col">Topic · E.ON ask</th>
      ${insts.map(i => {
        const dot = `<span class="hm-inst-dot" style="background:${instDotColor[i.id] || 'var(--text-tertiary)'}"></span>`;
        if (rawEp && (i.id === 'ep' || i.id === 'envi')) {
          return `<th>${dot}<select class="ep-mode-select" onchange="setOverviewEpMode(this.value)">
            <option value="envi"${overviewEpMode === 'envi' ? ' selected' : ''}>ENVI Committee</option>
            <option value="plenary"${overviewEpMode === 'plenary' ? ' selected' : ''}>Plenary</option>
          </select></th>`;
        }
        return `<th>${dot}${i.label.replace(' / Member States','')}</th>`;
      }).join('')}
    </tr>`;

  const SHORT_LABELS = {
    ets1general: 'Preserve ETS1 as core instrument',
    lrf: 'Lower the Linear Reduction Factor',
    msr: 'Reform MSR — no discretionary intervention',
    beccs: 'Integrate BECCS / carbon removals',
    art29a: 'Strengthen Art. 29a price containment',
    speculation: 'No new EUA trading restrictions',
    booster: 'Oppose auction frontloading',
    mwi: 'Integrate waste incineration',
    freealloc: 'Slower free-allocation phase-out',
    indirect: 'Extend indirect cost compensation',
    modfund: 'Maintain Modernisation Fund',
    ets2delay: 'No further ETS2 delay',
  };
  const rowsHTML = topics.map(t => {
    const cells = insts.map(inst => {
      const v = institutionVerdict(inst, t.id);
      const pctHTML = v.pct !== null ? `<span class="hm-pct">${v.pct}%</span>` : '';
      return `<td class="hm-cell"><span class="hm-verdict ${v.cls}">${v.label}${pctHTML}</span></td>`;
    }).join('');
    const shortL = SHORT_LABELS[t.id] || t.label;
    return `
      <tr>
        <td class="hm-topic-cell">${shortL}<span class="hm-code">${t.code}</span></td>
        ${cells}
      </tr>`;
  }).join('');

  return `
    <div class="exec-hero">
      <div class="exec-hero-headline">
        Across <strong>${topics.length} reform topics</strong>, the European Parliament's weighted majority currently leans
        <span class="hl-support">aligned with E.ON on ${epAligned}</span> and
        <span class="hl-oppose">opposed on ${epOpposed}</span>, with the remainder mixed or not yet assessed.
        The matrix below shows the majority position of each institution per topic — read across a row to see where the three institutions converge or split.
      </div>
      <div class="heatmap-wrap">
        <table class="heatmap">
          <thead>${headHTML}</thead>
          <tbody>${rowsHTML}</tbody>
        </table>
      </div>
      <div class="heatmap-caption">
        Verdict = weighted majority stance (confidence-discounted). % = share of that institution's weight holding the majority position. "—" = below 10% assessed coverage. Full detail in "By Institution" and "By Topic".
      </div>
    </div>`;
}

function renderEuaPriceCard(ov) {
  const eua = ov.euaPrice;
  if (!eua || !Array.isArray(eua.history) || eua.history.length === 0) return '';

  const allSorted = eua.history.slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  const latestAll = allSorted[allSorted.length - 1];
  // Rolling 12-month window: only points within exactly one year of the latest logged date are
  // ever plotted — older points fall off automatically as new ones are appended each morning update.
  const oneYearAgo = latestAll ? new Date(latestAll.date) : null;
  if (oneYearAgo) oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
  const sorted = oneYearAgo ? allSorted.filter(p => new Date(p.date) >= oneYearAgo) : allSorted;
  const latest = sorted[sorted.length - 1];
  const prev = sorted.length > 1 ? sorted[sorted.length - 2] : null;

  let changeHTML = '';
  if (prev && typeof prev.price === 'number' && typeof latest.price === 'number') {
    const delta = latest.price - prev.price;
    const pct = (delta / prev.price) * 100;
    const dir = delta > 0.005 ? 'up' : (delta < -0.005 ? 'down' : 'flat');
    const arrow = dir === 'up' ? '▲' : (dir === 'down' ? '▼' : '▬');
    const sign = delta > 0 ? '+' : '';
    changeHTML = `<span class="eua-price-change ${dir}">${arrow} ${sign}${delta.toFixed(2)} (${sign}${pct.toFixed(1)}%)</span>`;
  }

  // Sparkline: normalize history into a compact inline SVG polyline.
  const W = 160, H = 44, PAD = 3;
  const prices = sorted.map(p => p.price).filter(p => typeof p === 'number');
  const min = Math.min(...prices), max = Math.max(...prices);
  const range = (max - min) || 1;
  const stepX = sorted.length > 1 ? (W - PAD * 2) / (sorted.length - 1) : 0;
  const points = sorted.map((p, i) => {
    const x = PAD + i * stepX;
    const y = H - PAD - ((p.price - min) / range) * (H - PAD * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const lastUp = prev ? latest.price >= prev.price : true;
  const strokeColor = lastUp ? 'var(--support)' : 'var(--oppose)';
  const sparklineHTML = `
    <svg class="eua-price-sparkline" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
      <polyline points="${points}" fill="none" stroke="${strokeColor}" stroke-width="1.75" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>
    </svg>`;

  const sourceLabel = eua.sourceLabel || 'Source';
  const sourceHTML = eua.sourceUrl
    ? `<a href="${eua.sourceUrl}" target="_blank" rel="noopener">${sourceLabel} ↗</a>`
    : sourceLabel;

  return `
    <div class="eua-price-card">
      <div>
        <div class="eua-price-label">EUA Carbon Price</div>
        <div class="eua-price-main">
          <span class="eua-price-value">${latest.price.toFixed(2)}</span>
          <span class="eua-price-unit">${eua.unit || 'EUR/tCO2'}</span>
          ${changeHTML}
        </div>
      </div>
      ${sparklineHTML}
      <div class="eua-price-meta">
        AS OF ${latest.date}<br>
        ${sourceHTML}${eua.instrument ? `<br>${eua.instrument}` : ''}
      </div>
    </div>`;
}

function renderHeadlineOfDayCard(ov) {
  // ov.headlineOfDay is a rolling array of weekday entries, most recent first (max 5 kept -- one working week).

function renderOverviewView() {
  const dossier = getDossier();
  const container = document.getElementById('overviewView');
  const ov = dossier.overview;

  if (!ov) {
    container.innerHTML = `<div class="overview-background">No overview content available for this dossier yet.</div>`;
    return;
  }

  const positionsHTML = dossier.topics.filter(t => t.eonPosition).map(t => `
    <div class="position-row">
      <span class="position-code">${t.code}</span>
      <span class="position-text">${t.eonPosition}</span>
    </div>
  `).join('');

  const MILESTONE_INST_META = {
    comm:    { label: 'Commission',            colorVar: '--comm' },
    ep:      { label: 'Parliament',             colorVar: '--ep' },
    council: { label: 'Council',                colorVar: '--council' },
  };

  function milestoneRowHTML(m, joint) {
    const occurred = !!m.occurred;
    const check = occurred ? '<span class="milestone-check">✓</span>' : '';
    const titleHTML = m.url ? `<a href="${m.url}" target="_blank" rel="noopener">${check}${m.title} ↗</a>` : `${check}${m.title}`;
    if (joint) {
      return `
        <div class="milestone-joint-row${occurred ? ' occurred' : ''}">
          <div class="milestone-date">${m.date}</div>
          <div class="milestone-body">
            <div class="milestone-title">${titleHTML}</div>
            <div class="milestone-status">${m.status}</div>
            <div class="milestone-note">${m.note || ''}</div>
          </div>
        </div>`;
    }
    return `
      <div class="milestone-row${occurred ? ' occurred' : ''}">
        <div class="milestone-date">${m.date}</div>
        <div class="milestone-title">${titleHTML}</div>
        <div class="milestone-status">${m.status}</div>
        <div class="milestone-note">${m.note || ''}</div>
      </div>`;
  }

  function sortByDate(a, b) { return (a.date || '').localeCompare(b.date || ''); }

  const allMilestones = ov.milestones || [];
  const jointMilestones = allMilestones.filter(m => m.institution === 'joint').sort(sortByDate);
  const colsHTML = Object.keys(MILESTONE_INST_META).map(instId => {
    const meta = MILESTONE_INST_META[instId];
    const items = allMilestones.filter(m => m.institution === instId).sort(sortByDate);
    const bodyHTML = items.length
      ? items.map(m => milestoneRowHTML(m, false)).join('')
      : `<div class="milestone-col-empty">No tracked milestones.</div>`;
    return `
      <div class="milestone-col">
        <div class="milestone-col-header">
          <span class="milestone-col-dot" style="background:var(${meta.colorVar})"></span>
          <span class="milestone-col-title">${meta.label}</span>
        </div>
        <div class="milestone-col-body">${bodyHTML}</div>
      </div>`;
  }).join('');

  const jointHTML = jointMilestones.length ? `
    <div class="milestone-joint-wrap">
      <div class="milestone-joint-label">Joint / cross-institutional milestones</div>
      ${jointMilestones.map(m => milestoneRowHTML(m, true)).join('')}
    </div>` : '';

  container.innerHTML = `
    <div class="overview-top-row">
      ${renderEuaPriceCard(ov)}
      ${renderHeadlineOfDayCard(ov)}
    </div>
    ${renderExecHeatmap(dossier)}
    <div class="overview-section">
      <div class="overview-section-title overview-section-title--toggle" onclick="toggleExpand('overview-eon-position'); renderOverviewView();">
        E.ON's Position
        <span class="expand-toggle overview-section-toggle-icon">${expandState['overview-eon-position'] ? '\u25be Hide' : '\u25b8 Show'}</span>
      </div>
      ${expandState['overview-eon-position'] ? `<div class="position-grid">${positionsHTML}</div>` : ''}
    </div>
    <div class="overview-section">
      <div class="overview-section-title">Background</div>
      <div class="overview-background">${ov.background || ''}</div>
    </div>
    <div class="overview-section">
      <div class="overview-section-title">Next Steps</div>
      <div class="milestone-cols">${colsHTML}</div>
      ${jointHTML}
      ${ov.milestonesLastChecked ? `<div class="milestones-checked">MILESTONES LAST CHECKED: ${ov.milestonesLastChecked}</div>` : ''}
    </div>
  `;
}

function populateDossierSelect() {
  const sel = document.getElementById('dossierSelect');
  // With a single dossier, the H1 already names it — hide the redundant switcher.
  if (Object.keys(DOSSIERS).length < 2) { sel.classList.add('hidden'); return; }
  sel.classList.remove('hidden');

  sel.value = currentDossierId;

    currentDossierId = e.target.value;
    renderHeader();
    populateTopicSelect();
    populateTopicKey();
    setActiveView(currentView);
  });
}

function populateTopicSelect() {
  const sel = document.getElementById('topicSelect');
  sel.innerHTML = getDossier().topics.map(t => `<option value="${t.id}">${t.code} — ${t.label}</option>`).join('');
}

function populateTopicKey() {
  document.getElementById('topicKeyPanel').innerHTML = getDossier().topics.map(t => `<span class="code">${t.code}</span> = ${t.label}`).join('<br>');
}

function setActiveView(view) {
  currentView = view;
  document.querySelectorAll('.view-toggle button').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  const topicSelect = document.getElementById('topicSelect');
  document.getElementById('overviewView').classList.toggle('hidden', view !== 'overview');
  document.getElementById('institutionView').classList.toggle('hidden', view !== 'institution');
  document.getElementById('topicView').classList.toggle('hidden', view !== 'topic');
  topicSelect.classList.toggle('hidden', view !== 'topic');
  if (view === 'overview') renderOverviewView();
  if (view === 'institution') renderInstitutionView();
  if (view === 'topic') renderTopicView(topicSelect.value);
}

document.querySelectorAll('.view-toggle button').forEach(btn => btn.addEventListener('click', () => setActiveView(btn.dataset.view)));
document.getElementById('topicSelect').addEventListener('change', (e) => renderTopicView(e.target.value));
document.getElementById('topicKeyToggle').addEventListener('click', () => {
  const panel = document.getElementById('topicKeyPanel');
  const isHidden = panel.classList.contains('hidden');
  panel.classList.toggle('hidden');
  document.getElementById('topicKeyToggle').textContent = isHidden ? 'Hide topic code key ▴' : 'Show topic code key ▾';
});

    "overview": {
      "background": "The Commission is preparing a comprehensive review of the EU ETS1, expected 17 July 2026 — the first of a package of proposals to strengthen the EU's economic resilience and competitiveness while delivering the 2040 climate target. It runs alongside a separate, already-tabled targeted proposal (COM(2026)153, 1 April 2026) to stop the automatic invalidation of allowances in the Market Stability Reserve, and will be accompanied on the same day by a dedicated third proposal to increase free allocation via revised sector-specific 'fallback benchmarks' (announced by Executive VP Séjourné, 26 Jun 2026, with the Commission seeking retroactive effect and rapid co-legislator agreement). Together, these will reshape the post-2030 emissions trading framework: the pace of the cap (LRF), the design of price-stability tools (MSR, Art. 29a), the future of free allocation and carbon-leakage protection, the interaction with CBAM, and how new instruments like the Investment Booster are financed. The European Council (19 March 2026) instructed the Commission to present the review \"by July 2026 at the latest\"; the proposal is now expected 17 July 2026. Council, Parliament and Commission have set Q1 2027 as their joint target for political agreement, though the Irish Presidency has floated a more ambitious 11 December 2026 target for political agreement in principle at Environment Council. Argus (10 Jul) and S&P Global Platts gave earlier directional granularity; Bloomberg (Krukowska/Nardelli, 15 Jul 2026, citing officials briefed ahead of publication) now gives the most concrete pre-publication figures: the LRF is set to hold near today's 4.4%/yr through 2035 before easing to a slower 2-2.4%/yr band from 2036 — materially slower long-run, though later than EPP/E.ON's push for a 3.4% cut sooner. On MSR, changes stay rule- and volume-based, not price-triggered (aligned with E.ON's no-discretionary-intervention ask); the post-2030 surplus-intake rate is set to halve from 24% to 12%, with up to 250Mt of high-quality domestic removals and a 2%-of-cap ceiling on international credits also expected in the text. On free allocation, officials confirmed a slower phase-out beyond 2034 for CBAM-exposed sectors, plus a companion fallback-benchmarks act adding roughly €6bn in free allowances through 2030 — both aligned with E.ON. On 14-15 July the same ten Member States (Italy, Poland, Bulgaria, Cyprus, Czechia, Estonia, Greece, Hungary, Romania, Slovakia — confirmed as one bloc across Reuters and eunews.it/ANSA coverage) sent a joint declaration demanding ETS2 be ‘carefully reconsidered’, free-allocation conditionality limited to additional (not baseline) allowances only, and the ETS1 near-zero target pushed ‘closer to 2050’ — a direct clash with Germany/Sweden and a real blocking-minority risk for the Commission's approach. The €30bn Investment Booster (financed via 400mn EUAs, first-come-first-served, light eligibility checks) is confirmed to launch before 2030. Given the direct bearing on E.ON's cost base and investment case for the 2030s, this is one of the highest-stakes EU energy policy files currently in motion.",
